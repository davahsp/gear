{% extends 'layout_app.html' %}

{% block title %}Manajemen Akun - GEAR{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-8 pb-10">
    
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Manajemen Akun</h1>
            <p class="mt-1 text-sm text-slate-500">Kelola pengguna dan pantau status akun sistem.</p>
        </div>
        
        <div class="mt-4 sm:mt-0">
            {% if perms.accounts.add_account %}
            <a href="{% url 'accounts:create' %}" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-colors">
                <svg class="-ml-1 mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                Tambah Akun Baru
            </a>
            {% endif %}
        </div>
    </div>

    <section class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
        
        <div class="p-5 border-b border-blue-100 bg-blue-50/30">
            <form id="filter-form" hx-indicator="#table-loader" class="flex flex-col sm:flex-row gap-4 items-center justify-between">
                
                <div class="relative w-full sm:w-96">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input type="search" name="name" 
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand transition-shadow" 
                        placeholder="Cari berdasarkan nama pengguna..."
                        hx-get="{% url 'accounts:htmx-account-table' %}"
                        hx-include="#filter-form"
                        hx-trigger="input changed delay:500ms, search"
                        hx-target="#account-table"
                    >
                </div>
                
                <div class="flex items-center w-full sm:w-auto space-x-3">
                    <select name="role" 
                        class="block w-full sm:w-40 pl-3 pr-8 py-2.5 text-sm border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand text-slate-700 bg-white shadow-sm cursor-pointer"
                        hx-get="{% url 'accounts:htmx-account-table' %}"
                        hx-include="#filter-form"
                        hx-trigger="change"
                        hx-target="#account-table"
                    >
                        <option value="">Semua Role</option> 
                        {% for group in groups %}
                            <option value="{{ group.name }}">{{ group.name }}</option>
                        {% endfor %}
                        <option value="owner">Owner</option>
                    </select>

                    <select name="status"
                        class="block w-full sm:w-40 pl-3 pr-8 py-2.5 text-sm border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand text-slate-700 bg-white shadow-sm cursor-pointer"
                        hx-get="{% url 'accounts:htmx-account-table' %}"
                        hx-trigger="change"
                        hx-target="#account-table"
                        hx-include="#filter-form"
                    >
                        <option value="">Semua Status</option>
                        <option value="active">Aktif</option>
                        <option value="inactive">Tidak Aktif</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="relative"> 
            <div id="table-loader" class="hidden [.htmx-request_&]:flex absolute inset-0 bg-white/70 backdrop-blur-[2px] z-10 items-center justify-center transition-opacity duration-200">
                <svg class="animate-spin h-8 w-8 text-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>

            <div class="overflow-x-auto" 
                id="account-table"
                hx-get="{% url 'accounts:htmx-account-table' %}"
                hx-include="#filter-form"
                hx-trigger="load"
                hx-indicator="#table-loader">
            </div>
        </div>
    </section>
</div>
{% endblock %}
