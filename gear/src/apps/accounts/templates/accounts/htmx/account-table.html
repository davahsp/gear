<table class="min-w-full divide-y divide-blue-100 text-sm w-full" id="accounts-tables">
    <thead class="bg-blue-50">
        <tr>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Nama & Kontak</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Role</th>
            <th scope="col" class="px-6 py-4 text-center text-xs font-semibold text-slate-700 uppercase tracking-wider">Status</th>
            <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Tanggal Didaftarkan</th>
            <th scope="col" class="px-6 py-4 text-center text-xs font-semibold text-slate-700 uppercase tracking-wider">Aksi</th>
        </tr>
    </thead>

    <tbody class="bg-white divide-y divide-blue-50">        
        {% for a in accounts %}
            {% include 'accounts/htmx/account-table-row.html' %}
        {% empty %}
            <tr>
                <td colspan="5" class="px-6 py-12 text-center bg-blue-50/20">
                    <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <h3 class="mt-2 text-sm font-medium text-slate-900">Tidak ada akun ditemukan</h3>
                    <p class="mt-1 text-sm text-slate-500">Sesuaikan filter pencarian atau tambahkan akun baru.</p>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
