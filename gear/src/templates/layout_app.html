{% extends 'root.html' %}

{% block body_layout %}
<div class="h-screen flex overflow-hidden">
    {% include 'includes/sidebar.html' %}

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white px-8 py-4 border-b border-gray-200">
            <div class="flex justify-between items-center w-full">
                <button class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>

                <form action="/accounts/logout/" method="POST">
                    {% csrf_token %}
                    <button class="flex items-center text-sm font-semibold text-red-500 hover:text-red-700 transition-colors">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                        Logout
                    </button>
                </form>
            </div>
            {% block header_extra %}{% endblock %}
        </header>

        <div class="p-8">
            {% block content %}{% endblock %}
        </div>
        
        <footer class="mt-auto py-4 text-center text-sm text-gray-500">
            &copy; {% now "Y" %} GEAR
            {% block footer_extra %}{% endblock %}
        </footer>
    </main>
</div>
{% endblock %}

{% block scripts %}

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const sidebar = document.querySelector('.sidebar nav');
        if (!sidebar) return;

        const savedScrollPosition = localStorage.getItem('sidebar-scroll-pos');
        if (savedScrollPosition) {
            sidebar.scrollTop = parseInt(savedScrollPosition, 10);
        }

        window.addEventListener('beforeunload', function() {
            localStorage.setItem('sidebar-scroll-pos', sidebar.scrollTop);
        });
    });
</script>
{% endblock %}
