{% extends 'layout_public.html' %}

{% block title %}404 Tidak Ditemukan - GEAR{% endblock %}

{% block public_content %}
<div class="flex flex-col items-center text-center">
    <div class="w-24 h-24 bg-yellow-50 rounded-full border-4 border-white shadow-sm flex items-center justify-center mb-6">
        <svg class="w-12 h-12 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
    </div>

    <h2 class="text-2xl font-bold text-gray-900 mb-2">
        Data Tidak Ditemukan
    </h2>
    <p class="text-gray-500 font-medium mb-8">
        Maaf, ID yang Anda cari tidak ditemukan atau telah dihapus. Silakan kembali ke halaman sebelumnya.
    </p>

    <a href="javascript:history.back()" class="w-full block mb-3">
        <button type="button" class="w-full bg-[#2B308B] hover:bg-[#232874] text-white px-6 py-3 rounded-lg font-medium transition-colors shadow-sm">
            ← Kembali
        </button>
    </a>
    <a href="/" class="w-full block">
        <button type="button" class="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-6 py-3 rounded-lg font-medium transition-colors shadow-sm">
            Ke Beranda 🏠
        </button>
    </a>
</div>
{% endblock %}
