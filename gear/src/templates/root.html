{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}GEAR{% endblock %}</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/htmx.org@2.0.0"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: '#1D4ED8',
                            secondary: '#2563EB',
                            brand: '#2B308B'
                        }
                    }
                }
            }
        </script>

        <link href="{% static 'dist/styles.css' %}" rel="stylesheet">
        {% block head_extra %}{% endblock %}
    </head>
    <body class="bg-gray-50 text-gray-800 font-sans" hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>

        {% block body_layout %}{% endblock %}

        <div id="custom-confirm-modal" class="relative z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
            <div class="modal-backdrop fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-200 opacity-0"></div>

            <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
                <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                    <div class="modal-panel relative transform overflow-hidden rounded-xl bg-white text-left shadow-2xl transition-all duration-200 opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95 sm:my-8 sm:w-full sm:max-w-lg">
                        <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
                            <div class="sm:flex sm:items-start">
                                <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-rose-100 sm:mx-0 sm:h-10 sm:w-10">
                                    <svg class="h-6 w-6 text-rose-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                    </svg>
                                </div>
                                <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
                                    <h3 class="text-base font-semibold leading-6 text-slate-900" id="modal-title">Konfirmasi Tindakan</h3>
                                    <div class="mt-2">
                                        <p class="text-sm text-slate-500" id="custom-confirm-message">
                                            </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-slate-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                            <button type="button" id="custom-confirm-btn" class="inline-flex w-full justify-center rounded-md bg-rose-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-rose-500 sm:ml-3 sm:w-auto transition-colors">
                                Ya, Lanjutkan
                            </button>
                            <button type="button" id="custom-cancel-btn" class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 sm:mt-0 sm:w-auto transition-colors">
                                Batal
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // 1. The Async Modal Function
            window.showCustomConfirmModal = function(message) {
                return new Promise((resolve) => {
                    const modal = document.getElementById('custom-confirm-modal');
                    const messageEl = document.getElementById('custom-confirm-message');
                    const btnConfirm = document.getElementById('custom-confirm-btn');
                    const btnCancel = document.getElementById('custom-cancel-btn');
                    const backdrop = modal.querySelector('.modal-backdrop');
                    const panel = modal.querySelector('.modal-panel');

                    // Set the dynamic message
                    messageEl.textContent = message;

                    // Show modal & trigger enter animations
                    modal.classList.remove('hidden');
                    // Slight delay ensures the display:block registers before transitioning opacity
                    requestAnimationFrame(() => {
                        backdrop.classList.remove('opacity-0');
                        panel.classList.remove('opacity-0', 'translate-y-4', 'sm:scale-95');
                    });

                    // Reusable close function
                    const closeModal = (result) => {
                        // Trigger exit animations
                        backdrop.classList.add('opacity-0');
                        panel.classList.add('opacity-0', 'translate-y-4', 'sm:scale-95');
                        
                        // Wait for animation to finish before hiding and resolving
                        setTimeout(() => {
                            modal.classList.add('hidden');
                            resolve(result); // Returns true or false back to HTMX
                        }, 200); 
                    };

                    // Using direct assignment (onclick) ensures old event listeners are overwritten
                    // every time the modal is summoned, preventing multiple ghost triggers.
                    btnConfirm.onclick = () => closeModal(true);
                    btnCancel.onclick = () => closeModal(false);
                    backdrop.onclick = () => closeModal(false); // Close if clicking outside
                });
            };

            // 2. The HTMX Interceptor
            document.body.addEventListener('htmx:confirm', function(evt) {

                if (!evt.detail.question) {
                    return;
                }

                // Stop HTMX from firing the request or showing the default browser alert
                evt.preventDefault();

                // Call our Promise-based modal
                showCustomConfirmModal(evt.detail.question).then(function(isConfirmed) {
                    if (isConfirmed) {
                        // If the promise resolves to true, tell HTMX to execute the request
                        evt.detail.issueRequest(true); 
                    }
                });
            });
        </script>
        
        {% block scripts %}{% endblock %}
    </body>
</html>
