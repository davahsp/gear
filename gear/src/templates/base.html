{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}GEAR{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D4ED8',
                        secondary: '#2563EB',
                        brand: '#2B308B' /* Custom dark blue from design */
                    }
                }
            }
        }
    </script>

    <link href="{% static 'dist/styles.css' %}" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    {% include 'includes/sidebar.html' %}

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="bg-white px-8 py-4 border-b border-gray-200">
            {% block header_extra %}{% endblock %}
        </header>

        <div class="p-8">
            {% block content %}
            {% endblock %}
        </div>
        
        <footer class="mt-auto py-4 text-center text-sm text-gray-500">
            &copy; {% now "Y" %} GEAR
            {% block footer_extra %}{% endblock %}
        </footer>
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
